name: Release Please

# PR titles are enforced to follow Conventional Commits by lint-pr-title.yaml.
# When a PR is squash-merged, GitHub uses the PR title as the commit message,
# so release-please can reliably parse commits on main to drive releases.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger publish workflow
        if: ${{ steps.release.outputs.releases_created }}
        run: gh workflow run publish.yml --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
