---
name: macOS -- Build Python wheel using golang's gopy

on:
  push:
      branches:
          - main
  pull_request:
      branches:
          - main

defaults:
  run:
    shell: bash

jobs:
  lint:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [macos-latest, ubuntu-22.04]
        go-version: [1.24.x]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go.sum
      - name: Install dependencies
        run: go get .
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install pre-commit dependencies
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - uses: pre-commit/action@v3.0.1

  build:
    runs-on: macos-latest
    permissions:
        contents: write

    strategy:
      fail-fast: true
      matrix:
        go-version: [1.24.x]
        python3_version: [ 11, 12 ]
        arch_cibw_go:
          - [ "x86_64", "amd64" ]
          - [ "arm64", "arm64" ]
    steps:
        - uses: actions/checkout@v6

        - name: Setup Go
          uses: actions/setup-go@v4
          with:
              go-version: ${{ matrix.go-version }}
              cache-dependency-path: go.sum

        - name: install gopy
          run: go install github.com/go-python/gopy@v0.4.10

        - name: install goimports
          run: go install golang.org/x/tools/cmd/goimports@latest

        - name: Test with Go
          run: go test

        - name: Setup project files
          run: |
              rm -rf poetry.lock pyproject.toml
              cp setup_ci.py setup.py

        - name: install gopy
          run: go install github.com/go-python/gopy@v0.4.10

        - name: install goimports
          run: go install golang.org/x/tools/cmd/goimports@latest

        - name: install python 3.${{ matrix.python3_version }}
          run: |
            brew install --force --overwrite python@3.${{ matrix.python3_version }}
            BREW_PREFIX="$(brew --prefix)"
            ln -s "$BREW_PREFIX/opt/python@3.${{ matrix.python3_version }}/bin/python3.${{ matrix.python3_version }}" "$BREW_PREFIX/bin/python_for_build"
            echo "PYTHON_FOR_BUILD=$BREW_PREFIX/bin/python_for_build" >> "$GITHUB_ENV"
            "$BREW_PREFIX/bin/python_for_build" --version

        - name: Create CC wrapper to replace deprecated -Ofast flag
          run: |
            cat > /tmp/cc-wrapper.sh << 'EOF'
            #!/bin/bash
            args=()
            for arg in "$@"; do
              [[ "$arg" == "-Ofast" ]] && args+=("-O3" "-ffast-math") || args+=("$arg")
            done
            exec clang "${args[@]}"
            EOF
            chmod +x /tmp/cc-wrapper.sh

        - name: install cibuildwheel and pybindgen
          run: $PYTHON_FOR_BUILD -m pip install --break-system-packages cibuildwheel==3.4.1 pybindgen

        - name: build wheels
          run: $PYTHON_FOR_BUILD -m cibuildwheel --output-dir wheelhouse
          env:
            CGO_ENABLED: 1  # build fails for arm if unset
            CIBW_ARCHS: ${{ matrix.arch_cibw_go[0] }}
            CIBW_REPAIR_WHEEL_COMMAND_MACOS: ""
            PYTHON_BINARY_PATH: ${{ env.PYTHON_FOR_BUILD }}
            CIBW_BUILD: "cp3${{ matrix.python3_version }}-*"
            CIBW_SKIP: "cp36-* cp37-* cp38-* cp39-* cp310-* cp313-* *-musllinux_x86_64"
            CIBW_ENVIRONMENT: >
              PATH=$PATH:/usr/local/go/bin
              GOARCH=${{ matrix.arch_cibw_go[1] }}
              CC=/tmp/cc-wrapper.sh
